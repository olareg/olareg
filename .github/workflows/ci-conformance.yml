name: CI and Conformance Tests

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
      - 'v*.*.*-rc*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  oci-conformance:
    strategy:
      matrix:
        oci-version: [ "stable", "dev" ]
    runs-on: ubuntu-latest
    env:
      # do not automatically upgrade go to a different version: https://go.dev/doc/toolchain
      GOTOOLCHAIN: "local"

    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: "Set up Go"
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0

    - name: Build and run olareg in the background
      id: run-olareg
      run: |
        make ci-setup
        echo "port=$(docker port olareg-ci 5000 | head -1 | cut -f2 -d:)" >>$GITHUB_OUTPUT

    - name: Run OCI Distribution Spec Conformance ${{ matrix.oci-version }}
      id: run-conformance
      uses: opencontainers/distribution-spec@main
      env:
        OCI_VERSION: "${{ matrix.oci-version }}"
        OCI_REGISTRY: "localhost:${{ steps.run-olareg.outputs.port }}"
        OCI_TLS: "disabled"
        OCI_REPO1: "myorg/myrepo"
        OCI_REPO2: "myorg/myrepo2"

    - name: Cleanup
      run: |
        make ci-cleanup

    # TODO: add CI tests with other tools (regclient, crane, skopeo, oras, docker)
